{% extends "players/base.html" %}

{% block title %}{{ action }} Player{% endblock %}

{% block content %}
<h1>{{ action }} Player</h1>
<div class="card">
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color: #e74c3c; font-size: 13px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'player_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
