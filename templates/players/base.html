<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Volleyball Player Manager{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f6f9;
            color: #333;
        }
        .navbar {
            background: #2c3e50;
            padding: 14px 30px;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .navbar a {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 16px;
        }
        .navbar a:hover { color: #3498db; }
        .navbar .brand { font-size: 20px; font-weight: bold; }
        .container {
            max-width: 960px;
            margin: 30px auto;
            padding: 0 20px;
        }
        h1, h2 { margin-bottom: 20px; color: #2c3e50; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            border-radius: 6px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #2c3e50; color: #fff; }
        tr:hover { background: #f1f8ff; }
        .btn {
            display: inline-block;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            color: #fff;
        }
        .btn-primary { background: #3498db; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #27ae60; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f39c12; }
        .btn-warning:hover { background: #e08e0b; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-secondary { background: #95a5a6; }
        .btn-secondary:hover { background: #7f8c8d; }
        .actions { display: flex; gap: 6px; }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; }
        .card {
            background: #fff;
            padding: 24px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }
        .detail-row { padding: 10px 0; border-bottom: 1px solid #eee; }
        .detail-label { font-weight: 600; color: #555; min-width: 140px; display: inline-block; }
        .empty-msg { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'player_list' %}" class="brand">🏐 VolleyPlayerList</a>
        <a href="{% url 'player_list' %}">All Players</a>
        <a href="{% url 'add_player' %}">Add Player</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
